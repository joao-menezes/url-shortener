<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL shortener</title>

    <link id="themeStylesheet" rel="stylesheet" href="themes/dark.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
<main class="container">

    <header style="display: flex;align-items: center;justify-content: space-between;">
        <h1>URL Shorter</h1>
        <button id="toggleThemeBtn" class="theme-toggle-btn" aria-label="Change Theme">🌙</button>
    </header>

    <div id="toast-container" aria-live="polite"></div>

    <section aria-labelledby="form-title">
        <form id="urlForm">
            <label for="originalUrl">Original URL:</label>
            <input
                    type="url"
                    id="originalUrl"
                    placeholder="Type original Url"
                    required
                    aria-required="true"
            />
            <button type="submit">Shorten URL</button>
        </form>
    </section>

    <section id="result" class="result" aria-live="polite" style="display: none;">
        <h2 id="form-title">Shortened URL:</h2>
        <p id="shortUrl"></p>
    </section>

    <div id="error" class="error" style="display: none;" role="alert">
        <p></p>
    </div>

    <section aria-labelledby="list-title">
        <h2 id="list-title">Shortened URLs</h2>
        <button id="deleteAllUrls" style="background-color: tomato">Delete all Urls</button>
        <ul id="shortUrlsList" class="short-urls-list"></ul>

        <div id="paginationControls" class="pagination-controls">

        </div>
    </section>

</main>

<script src="app.js"></script>
</body>
</html>
