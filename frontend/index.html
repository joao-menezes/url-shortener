<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aplicação para encurtar URLs de forma prática e eficiente." />
    <title>Encurtador de URL</title>

    <!-- Estilos -->
    <link id="themeStylesheet" rel="stylesheet" href="themes/dark.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
<main class="container">

    <header style="display: flex;align-items: center;justify-content: space-between;">
        <h1>Encurtador de URL</h1>
        <button id="toggleThemeBtn" class="theme-toggle-btn" aria-label="Alternar tema">🌙 Tema Escuro</button>
    </header>

    <div id="toast-container" aria-live="polite"></div>

    <!-- Formulário de Encurtamento -->
    <section aria-labelledby="form-title">
        <form id="urlForm">
            <label for="originalUrl">URL Original:</label>
            <input
                    type="url"
                    id="originalUrl"
                    placeholder="Digite a URL original"
                    required
                    aria-required="true"
            />
            <button type="submit">Encurtar URL</button>
        </form>
    </section>

    <section id="result" class="result" aria-live="polite" style="display: none;">
        <h2 id="form-title">URL Encurtada:</h2>
        <p id="shortUrl"></p>
    </section>

    <div id="error" class="error" style="display: none;" role="alert">
        <p></p>
    </div>

    <section aria-labelledby="list-title">
        <h2 id="list-title">URLs Encurtadas</h2>
        <button id="deleteAllUrls" style="background-color: tomato">Deletar todas as Urls</button>
        <ul id="shortUrlsList" class="short-urls-list"></ul>

        <div id="paginationControls" class="pagination-controls">

        </div>
    </section>

</main>

<script src="app.js"></script>
</body>
</html>
